<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Spaced-repetition flashcard review of medical terms you missed on MedCross.">
    <title>Study - MedCross</title>
    <link rel="manifest" href="manifest.webmanifest">
    <meta name="theme-color" content="#f5f7fb">
    <link rel="stylesheet" href="style.css?v=27">
</head>
<body>
    <div id="study-page">
        <header class="main-header">
            <button class="stats-back" data-nav="stats.html" type="button">Back to Stats</button>
            <h1>Study Session</h1>
            <p>Spaced-repetition review of terms you missed</p>
        </header>

        <div class="container study-container">
            <div class="study-mode-tabs">
                <button id="study-due" class="study-mode-tab active" type="button">Due</button>
                <button id="study-all" class="study-mode-tab" type="button">All</button>
            </div>
            <div class="study-progress-bar">
                <div class="study-progress-fill" id="study-progress-fill"></div>
            </div>
            <div class="study-meta" id="study-meta"></div>

            <div class="flashcard" id="flashcard">
                <div class="flashcard-inner">
                    <div class="flashcard-label" id="flashcard-label">Clue</div>
                    <div class="flashcard-front" id="flashcard-front">—</div>
                    <div class="flashcard-back" id="flashcard-back" hidden>
                        <div class="flashcard-answer" id="flashcard-answer"></div>
                        <div class="flashcard-category" id="flashcard-category"></div>
                        <button id="flashcard-ai" class="flashcard-ai" type="button" hidden>AI Explain</button>
                        <div id="flashcard-ai-text" class="flashcard-ai-text" hidden></div>
                    </div>
                </div>
            </div>

            <div class="study-controls" id="study-controls">
                <button class="study-btn study-btn-show" id="show-answer">Show Answer</button>
                <div class="study-grade" id="study-grade" hidden>
                    <button class="study-btn study-btn-missed" id="grade-again" data-grade="again" type="button">Again</button>
                    <button class="study-btn study-btn-hard" id="grade-hard" data-grade="hard" type="button">Hard</button>
                    <button class="study-btn study-btn-got" id="grade-good" data-grade="good" type="button">Good</button>
                    <button class="study-btn study-btn-easy" id="grade-easy" data-grade="easy" type="button">Easy</button>
                </div>
            </div>

            <div class="study-done" id="study-done" hidden>
                <h2 id="study-done-title">All caught up!</h2>
                <p id="study-done-sub"></p>
                <div class="study-done-actions">
                    <button class="study-btn study-btn-show" data-nav="stats.html" type="button">Back to Stats</button>
                    <button class="study-btn study-btn-show" data-nav="index.html" type="button">Solve a Puzzle</button>
                </div>
            </div>
        </div>
    </div>

    <script src="progress.js?v=12"></script>
    <script src="config.public.js?v=2"></script>
    <script src="config.js"></script>
    <script src="gemini.js?v=16"></script>
    <script src="study.js?v=14"></script>
    <script>if ('serviceWorker' in navigator) navigator.serviceWorker.register('sw.js').catch(() => {});</script>
</body>
</html>
